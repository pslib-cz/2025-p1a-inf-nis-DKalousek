<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d3748" />
    </marker>
    <style>
      .participant { font: bold 14px sans-serif; fill: #111; }
      .box { fill: #f4f7fb; stroke: #2b6cb0; stroke-width: 2; rx:8; }
      .lifeline { stroke: #4a5568; stroke-width: 2; stroke-dasharray: 6 4; }
      .arrow { stroke: #2d3748; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .label { font: 13px sans-serif; fill: #111; }
      .note { font: 12px sans-serif; fill: #444; }
      .footer { font: 12px sans-serif; fill: #666; text-anchor: middle; }
    </style>
  </defs>

  <!-- Title -->
  <text x="600" y="28" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Sekvenční diagram — komunikace: Uživatel → Frontend → Backend → Databáze</text>

  <!-- Participants -->
  <g id="participants">
    <rect x="90" y="60" width="120" height="36" class="box" />
    <text x="150" y="84" class="participant" text-anchor="middle">Uživatel</text>

    <rect x="340" y="60" width="140" height="36" class="box" />
    <text x="410" y="84" class="participant" text-anchor="middle">Frontend</text>

    <rect x="610" y="60" width="140" height="36" class="box" />
    <text x="680" y="84" class="participant" text-anchor="middle">Backend</text>

    <rect x="930" y="60" width="140" height="36" class="box" />
    <text x="1000" y="84" class="participant" text-anchor="middle">Databáze</text>
  </g>

  <!-- Lifelines -->
  <line x1="150" y1="110" x2="150" y2="360" class="lifeline" />
  <line x1="410" y1="110" x2="410" y2="360" class="lifeline" />
  <line x1="680" y1="110" x2="680" y2="360" class="lifeline" />
  <line x1="1000" y1="110" x2="1000" y2="360" class="lifeline" />

  <!-- Messages -->
  <!-- 1) User -> Frontend -->
  <path d="M170,150 L380,150" class="arrow" />
  <text x="275" y="140" class="label" text-anchor="middle">Uživatel: Požadavek (např. odeslání formuláře)</text>

  <!-- 2) Frontend -> Backend -->
  <path d="M430,190 L650,190" class="arrow" />
  <text x="540" y="180" class="label" text-anchor="middle">Frontend: API call (POST /requests)</text>

  <!-- 3) Backend -> Databáze -->
  <path d="M700,230 L950,230" class="arrow" />
  <text x="825" y="220" class="label" text-anchor="middle">Backend: Query (INSERT / SELECT)</text>

  <!-- 4) Databáze -> Backend (response) -->
  <path d="M950,270 L700,270" class="arrow" />
  <text x="825" y="285" class="label" text-anchor="middle">Databáze: Výsledek dotazu</text>

  <!-- 5) Backend -> Frontend (response) -->
  <path d="M650,310 L430,310" class="arrow" />
  <text x="540" y="300" class="label" text-anchor="middle">Backend: Response (200 OK / data)</text>

  <!-- 6) Frontend -> Uživatel (render) -->
  <path d="M380,345 L170,345" class="arrow" />
  <text x="275" y="335" class="label" text-anchor="middle">Frontend: Zobrazení výsledku / potvrzení akce</text>

  <!-- Optional async notification: Backend -> Frontend (push) -->
  <path d="M700,155 L410,155" class="arrow" stroke-dasharray="6,4" />
  <text x="555" y="146" class="label" text-anchor="middle">(Volitelně) Backend: Push notifikace/WebSocket</text>

  <!-- Notes -->
  <rect x="20" y="370" width="1160" height="80" rx="8" fill="#fff8e5" stroke="#d69e2e" />
  <text x="40" y="395" class="note">Poznámka: Diagram ukazuje typickou synchronní výměnu zpráv při zpracování uživatelského požadavku. Čárkované čáry reprezentují volitelnou asynchronní notifikaci (push).</text>

  <!-- Footer -->
  <text x="600" y="462" class="footer">Autor: DKalousek — vygenerováno pro repozitář pslib-cz/2025-p1a-inf-nis-DKalousek</text>
</svg>
