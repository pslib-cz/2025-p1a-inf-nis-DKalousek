      <path d="M8 1L15 5L8 9L1 5Z" fill="none" stroke="context-stroke" stroke-width="1.2"/>
    </marker>
    <marker id="diamond-filled" viewBox="0 0 16 10" refX="1" refY="5" markerWidth="10" markerHeight="8" orient="auto-start-reverse">
