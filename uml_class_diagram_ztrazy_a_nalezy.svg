  <desc>Třídový diagram zobrazující třídy Uzivatel, NalezenaPredmet, ZtrazenaPredmet, AIAnalyza, Notifikace, Spojeni a Databaze s jejich atributy, metodami a vztahy.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
