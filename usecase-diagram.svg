<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <style>
    .actor { font: bold 14px sans-serif; fill: #111; }
    .actor-box { fill: #f4f7fb; stroke: #2b6cb0; stroke-width: 2; rx:8; }
    .usecase { fill: #fff; stroke: #2d3748; stroke-width: 2; }
    .usecase-text { font: 13px sans-serif; fill: #111; text-anchor: middle; }
    .line { stroke: #2d3748; stroke-width: 1.8; }
    .note { font: 12px sans-serif; fill: #444; }
  </style>

  <!-- Title -->
  <text x="600" y="30" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">UML Use Case diagram — Informační systém</text>

  <!-- Actors (left) -->
  <g id="actors-left">
    <!-- Guest -->
    <rect x="40" y="80" width="150" height="44" class="actor-box"/>
    <text x="115" y="108" class="actor">Host (Guest)</text>

    <!-- User -->
    <rect x="40" y="190" width="150" height="44" class="actor-box"/>
    <text x="115" y="218" class="actor">Registrovaný uživatel (User)</text>

    <!-- Manager -->
    <rect x="40" y="300" width="150" height="44" class="actor-box"/>
    <text x="115" y="328" class="actor">Manažer (Manager)</text>

    <!-- Admin -->
    <rect x="40" y="410" width="150" height="44" class="actor-box"/>
    <text x="115" y="438" class="actor">Administrátor (Admin)</text>
  </g>

  <!-- Use cases (center column) -->
  <g id="usecases-center">
    <!-- Column 1 -->
    <ellipse cx="430" cy="80" rx="160" ry="28" class="usecase"/>
    <text x="430" y="85" class="usecase-text">Prohlížet veřejné informace</text>

    <ellipse cx="430" cy="150" rx="140" ry="26" class="usecase"/>
    <text x="430" y="155" class="usecase-text">Registrovat se</text>

    <ellipse cx="430" cy="220" rx="120" ry="26" class="usecase"/>
    <text x="430" y="225" class="usecase-text">Přihlásit se</text>

    <ellipse cx="430" cy="290" rx="140" ry="26" class="usecase"/>
    <text x="430" y="295" class="usecase-text">Spravovat profil</text>

    <ellipse cx="430" cy="360" rx="150" ry="26" class="usecase"/>
    <text x="430" y="365" class="usecase-text">Vytvořit požadavek</text>

    <ellipse cx="430" cy="430" rx="150" ry="26" class="usecase"/>
    <text x="430" y="435" class="usecase-text">Prohlížet stav požadavku</text>

    <ellipse cx="430" cy="500" rx="120" ry="26" class="usecase"/>
    <text x="430" y="505" class="usecase-text">Prohlížet zprávy</text>
  </g>

  <!-- Use cases (right column) -->
  <g id="usecases-right">
    <ellipse cx="820" cy="200" rx="170" ry="30" class="usecase"/>
    <text x="820" y="205" class="usecase-text">Schválit / odmítnout požadavek</text>

    <ellipse cx="820" cy="300" rx="140" ry="26" class="usecase"/>
    <text x="820" y="305" class="usecase-text">Spravovat uživatele</text>

    <ellipse cx="820" cy="360" rx="140" ry="26" class="usecase"/>
    <text x="820" y="365" class="usecase-text">Generovat zprávy</text>

    <ellipse cx="820" cy="430" rx="150" ry="26" class="usecase"/>
    <text x="820" y="435" class="usecase-text">Konfigurovat systém</text>

    <ellipse cx="820" cy="500" rx="120" ry="26" class="usecase"/>
    <text x="820" y="505" class="usecase-text">Zálohovat data</text>

    <ellipse cx="820" cy="560" rx="140" ry="26" class="usecase"/>
    <text x="820" y="565" class="usecase-text">Odeslat notifikaci</text>
  </g>

  <!-- Connections -->
  <!-- Guest -->
  <line x1="190" y1="102" x2="270" y2="85" class="line" />
  <line x1="270" y1="85" x2="270" y2="85" class="line" />
  <line x1="270" y1="85" x2="270" y2="85" class="line" />
  <line x1="270" y1="85" x2="350" y2="85" class="line" />

  <!-- Guest -> Register -> Login includes (visual note) -->
  <line x1="190" y1="220" x2="350" y2="150" class="line" />

  <!-- User connections -->
  <line x1="190" y1="228" x2="350" y2="225" class="line" />
  <line x1="190" y1="228" x2="350" y2="295" class="line" />
  <line x1="190" y1="228" x2="350" y2="365" class="line" />
  <line x1="190" y1="228" x2="350" y2="435" class="line" />

  <!-- Manager connections -->
  <line x1="190" y1="338" x2="650" y2="205" class="line" />
  <line x1="190" y1="338" x2="650" y2="365" class="line" />
  <line x1="190" y1="338" x2="650" y2="305" class="line" />

  <!-- Admin connections -->
  <line x1="190" y1="448" x2="650" y2="305" class="line" />
  <line x1="190" y1="448" x2="650" y2="435" class="line" />
  <line x1="190" y1="448" x2="650" y2="505" class="line" />

  <!-- CreateRequest includes SendNotification and ViewRequestStatus (visual arrows) -->
  <line x1="580" y1="360" x2="740" y2="560" class="line" stroke-dasharray="6,4" />
  <line x1="580" y1="360" x2="430" y2="430" class="line" stroke-dasharray="6,4" />

  <!-- ApproveRequest includes SendNotification and GenerateReports (visual arrows) -->
  <line x1="820" y1="200" x2="740" y2="560" class="line" stroke-dasharray="6,4" />
  <line x1="820" y1="200" x2="820" y2="360" class="line" stroke-dasharray="6,4" />

  <!-- Legend / notes -->
  <rect x="20" y="660" width="1160" height="80" rx="8" fill="#fff8e5" stroke="#d69e2e" />
  <text x="40" y="690" class="note">Poznámky: Čárkované čáry značí relation "includes" (zahrnutí). Actor -> UseCase jsou přímé vazby mezi aktéry a případy užití.</text>

  <!-- Footer -->
  <text x="600" y="740" text-anchor="middle" class="note">Autor: DKalousek — vygenerováno pro repozitář pslib-cz/2025-p1a-inf-nis-DKalousek</text>
</svg>
